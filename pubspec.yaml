name: healthvault
description: HealthVault - AI Health Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  provider: ^6.1.1

  # AI
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  google_mlkit_text_recognition: ^0.15.0
  syncfusion_flutter_pdf: ^28.2.12
  file_picker: ^8.1.2
  path: ^1.9.0

  # Charts
  fl_chart: ^0.67.0

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/images/
    - assets/icons/
