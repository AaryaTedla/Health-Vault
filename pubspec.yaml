name: healthvault
description: HealthVault - AI Health Companion
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  provider: ^6.1.1

  # AI
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  google_mlkit_text_recognition: ^0.15.0
  syncfusion_flutter_pdf: ^28.2.12
  file_picker: ^8.1.2
  path: ^1.9.0

  # Charts
  fl_chart: ^0.67.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4
  geolocator: ^13.0.2

  # Firebase (free tier backend)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Voice & Audio
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  permission_handler: ^11.0.0
  audio_session: ^0.1.16

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/images/
    - assets/icons/
    - assets/data/medicines_v2.json
